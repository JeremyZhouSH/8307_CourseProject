project_name: summarization-agent
input_path: data/samples/sample_paper.txt
output_path: data/outputs/summary.json
max_sections: 20

llm:
  use_mock: true
  #model: local-mock
  model: deepseek-chat
  api_key_env: OPENAI_API_KEY
  #base_url: https://api.openai.com/v1
  base_url: https://api.deepseek.com/v1
  chat_endpoint: /chat/completions
  timeout_seconds: 30
  temperature: 0.0
  max_tokens: 512

pipeline:
  min_sentence_chars: 30
  max_summary_sentences: 6
  use_llm_final_summary: true

extractor:
  strategy: ilp
  role_tagger: crf
  word_budget: 200
  max_sentences_per_role: 2
  redundancy_penalty: 0.35
  similarity_threshold: 0.12
  score_boost_section_match: 0.3
  score_boost_role_confidence: 0.8
  min_role_coverage:
    objective: 1
    methods: 1
    results: 1
    limitations: 1
